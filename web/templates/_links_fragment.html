"""
Template für Links-Fragment
"""

<div id="links-{{ item.id }}" class="links-list">
  {% for url in item.links %}
  <span class="link-row" data-url="{{ url }}">
    <a href="{{ url }}" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="link-anchor" 
       title="{{ url }}">
      {% set domain_name = url | regex_replace(r'^https?://([^/]+).*$', r'\1') %}
      <img src="https://www.google.com/s2/favicons?domain={{ domain_name }}" 
           alt="" 
           class="link-favicon" 
           loading="lazy" 
           onerror="this.src='/static/icons/link.svg'">
      <span class="link-text">{{ url }}</span>
    </a>
    <button type="button" 
            class="link-del" 
            title="Entfernen" 
            aria-label="Link entfernen"
            hx-post="/items/{{ item.id }}/links/remove" 
            hx-params="*" 
            hx-include="closest .link-row" 
            hx-target="#links-{{ item.id }}" 
            hx-swap="outerHTML"
            style="padding: 0 .3em; background: none; border: none; cursor: pointer;">×</button>
    <input type="hidden" name="url" value="{{ url }}">
  </span>
  {% endfor %}
</div>
