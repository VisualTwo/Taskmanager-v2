<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen - Task Manager</title>
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Passwort vergessen</h1>
            
            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}
            
            {% if success %}
            <div class="alert alert-success">
                {{ success }}
                <br><br>
                <a href="/auth/login">Zurück zur Anmeldung</a>
            </div>
            {% else %}
            
            <p>Geben Sie Ihre E-Mail-Adresse ein und wir senden Ihnen einen Link zum Zurücksetzen Ihres Passworts.</p>
            
            <form method="post" action="/auth/forgot-password">
                <div class="form-group">
                    <label for="email">E-Mail-Adresse:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <button type="submit" class="btn btn-primary">E-Mail senden</button>
            </form>
            
            <div class="auth-links">
                <p><a href="/auth/login">Zurück zur Anmeldung</a></p>
            </div>
            
            {% endif %}
        </div>
    </div>
</body>
</html>
